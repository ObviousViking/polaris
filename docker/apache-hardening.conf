# .htaccess relies on php_value directives (upload limits), which require
# AllowOverride All on the document root.
<Directory /var/www/html>
    AllowOverride All
</Directory>

# The DB schema dump, ini configs, and log files sit in the webroot but were
# never meant to be fetched directly over HTTP.
<FilesMatch "\.(sql|ini|log)$">
    Require all denied
</FilesMatch>

<Directory /var/www/html/includes>
    Require all denied
</Directory>

# CLI-only maintenance scripts (e.g. bin/reset_password.php) - never meant
# to be reachable over HTTP, regardless of the PHP_SAPI check they also do.
<Directory /var/www/html/bin>
    Require all denied
</Directory>
