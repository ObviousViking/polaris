; Registers the DB-backed session handler before every request.
auto_prepend_file = /var/www/html/includes/session_bootstrap.php

; Don't leak stack traces/paths/query errors to end users; still logged.
display_errors = Off
log_errors = On

session.gc_maxlifetime = 1440

; Full system backups can be sizeable and take longer than the defaults.
upload_max_filesize = 1024M
post_max_size = 1024M
max_execution_time = 0
max_input_time = -1
