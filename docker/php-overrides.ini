; Runs before every request so the DB-backed session handler is registered
; before any page's own session_start() call (see includes/session_bootstrap.php).
auto_prepend_file = /var/www/html/includes/session_bootstrap.php

; This app handles case/evidence data - don't leak stack traces, file paths,
; or query errors to end users. Errors are still logged.
display_errors = Off
log_errors = On

session.gc_maxlifetime = 1440

; Full system backups (DB dump + all uploaded evidence files) via System
; Management -> System Settings (see captains_quarters/backup_download.php /
; restore_process.php) can be sizeable and the mysqldump/mysql/tar shell-outs
; take longer than the 30s compiled-in default as data grows.
upload_max_filesize = 1024M
post_max_size = 1024M
max_execution_time = 0
max_input_time = -1
