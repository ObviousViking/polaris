# Uploaded evidence, served via alias with PHP execution denied.
Alias /polaris_uploads /var/www/polaris-data

<Directory /var/www/polaris-data>
    Options -Indexes -ExecCGI
    AllowOverride None
    Require all granted

    <FilesMatch "\.ph(p[3457]?|t|tml)$">
        Require all denied
    </FilesMatch>
</Directory>
