# Uploaded evidence (avatars/exhibit photos/exhibit documents) is stored
# outside the PHP-executable webroot, on its own volume, and served via this
# alias. PHP execution is explicitly denied here so an uploaded file can
# never be executed even if its extension collides with a PHP handler.
Alias /polaris_uploads /var/www/polaris-data

<Directory /var/www/polaris-data>
    Options -Indexes -ExecCGI
    AllowOverride None
    Require all granted

    <FilesMatch "\.ph(p[3457]?|t|tml)$">
        Require all denied
    </FilesMatch>
</Directory>
