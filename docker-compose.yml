version: "3.8"

# Polaris app + MySQL. Run with: docker compose up -d
# Pulls the app image from Docker Hub by default - swap `image:` below for
# `build: .` to build from local source instead.
#
# Change the placeholder passwords below before deploying anywhere reachable
# off your own machine. If you change MYSQL_ROOT_PASSWORD, also update the
# healthcheck's -p flag to match.
#
# Before deploying to Unraid: remove the db service's `ports:` block, it's
# only there for local MySQL Workbench access during development.

services:
  db:
    image: mysql:8.0
    container_name: polaris_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: change_me_root
      MYSQL_DATABASE: polaris
      MYSQL_USER: polaris_app
      MYSQL_PASSWORD: change_me_app
    ports:
      - "3306:3306"
    volumes:
      - polaris_db_data:/var/lib/mysql
    # log_bin_trust_function_creators lets the app's non-root DB user create triggers.
    command: --default-authentication-plugin=mysql_native_password --log_bin_trust_function_creators=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pchange_me_root"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: obviousviking/polaris:latest
    container_name: polaris_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: polaris_app
      DB_PASS: change_me_app
      DB_NAME: polaris
      # Host path shown in the UI (Setup / Manage Storage Settings).
      DATA_HOST_PATH: ${POLARIS_DATA_PATH:-./polaris_data}
      HISTORY_HMAC_KEY: ${HISTORY_HMAC_KEY:-change_me_hmac_key}
    ports:
      - "8080:80"
    volumes:
      - ${POLARIS_DATA_PATH:-./polaris_data}:/var/www/polaris-data

volumes:
  polaris_db_data:
